<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — YUYA KATO</title>
<meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@400;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fcfcfc;--ink:#1a1a1a;--ink-soft:#6f6f6f;--line:#eeeeee;--footer:#f5f5f5;
    --font-serif:"Montserrat","BIZ UDGothic",-apple-system,sans-serif;
    --font-sans:"Montserrat","BIZ UDGothic",-apple-system,sans-serif;
    --radius:.4375rem;--pad:96px;--ease:cubic-bezier(.16,1,.3,1)
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;background:var(--bg)}
  #bg{position:fixed;inset:0;width:100vw;height:100vh;z-index:-1;display:block;pointer-events:none;filter:blur(4px);transform:scale(1.04)}
  body{font-family:var(--font-serif);font-weight:400;background:transparent;color:var(--ink);line-height:1.8;font-feature-settings:"chws";-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}
  h1,.eyebrow,.back,.submeta,.menu,header .logo,.credits b,.btn,.pager,.copy{font-family:var(--font-sans)}
  ::selection{background:var(--ink);color:var(--bg)}
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
  .reveal.in{opacity:1;transform:none}
  /* Main image: diagonal 3D entrance (matches works thumbnails) */
  .hero-img.reveal{transform:perspective(1300px) translate3d(44px,72px,0) rotateX(10deg) rotateY(-9deg) scale(.93);transform-origin:50% 100%;transition:opacity 1.1s var(--ease),transform 1.1s var(--ease)}
  .hero-img.reveal.in{transform:none}
  .cursor{position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--ink);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .35s var(--ease),height .35s var(--ease),background .35s;mix-blend-mode:difference}
  .cursor.big{width:84px;height:84px;background:#fff}
  .cursor .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.62rem;letter-spacing:.12em;color:#0d0d0d;text-transform:uppercase;opacity:0;transition:opacity .3s}
  .cursor.big .lbl{opacity:1}
  @media(hover:none),(max-width:820px){.cursor{display:none}}

  header{position:fixed;top:0;left:0;width:100%;z-index:200;padding:26px var(--pad);display:flex;justify-content:space-between;align-items:center;mix-blend-mode:difference;color:#fff}
  header .logo{font-weight:500;font-size:1rem;letter-spacing:-.01em}
  header .logo i{font-style:normal;font-weight:400;opacity:.7}
  .menu{display:flex;gap:30px;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase}
  .menu a{position:relative;opacity:.85;transition:opacity .3s}
  .menu a::after{content:"";position:absolute;left:0;bottom:-5px;width:0;height:1px;background:currentColor;transition:width .4s var(--ease)}
  .menu a:hover{opacity:1} .menu a:hover::after{width:100%}
  .menu .has-sub{position:relative}
  .menu .sub{position:absolute;top:100%;left:0;display:flex;flex-direction:column;gap:11px;padding-top:14px;opacity:0;visibility:hidden;transform:translateY(6px);transition:opacity .3s var(--ease),transform .3s var(--ease),visibility .3s}
  .menu .has-sub:hover .sub{opacity:1;visibility:visible;transform:none}
  .menu .sub a{font-size:.7rem;text-transform:none;letter-spacing:.04em;opacity:.75;white-space:nowrap}
  .burger{display:none;flex-direction:column;gap:6px;background:none;border:none;cursor:pointer}
  .burger span{width:26px;height:2px;background:#fff;transform-origin:center;transition:transform .35s var(--ease),opacity .25s,background .3s}

  main{max-width:1180px;margin:0 auto;padding:120px var(--pad) 90px}
  .back{display:inline-flex;align-items:center;gap:8px;font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:40px;transition:gap .3s var(--ease),color .3s}
  .back:hover{gap:14px;color:var(--ink)}
  .eyebrow{font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:16px}
  h1{font-weight:520;font-size:clamp(1.9rem,5vw,3.4rem);letter-spacing:-.01em;line-height:1.2;max-width:20ch}
  .submeta{margin-top:16px;font-size:1rem;color:var(--ink-soft)}

  .hero-img{margin-top:44px;border-radius:14px;overflow:hidden;aspect-ratio:16/9;background:#f0f0f0;position:relative}
  .hero-img img{width:100%;height:100%;object-fit:cover}
  .hero-img .ss-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .9s var(--ease)}
  .hero-img .ss-img.on{opacity:1}
  .ss-ctrl{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
  .ss-ctrl .ss-arrow{border:none;background:none;color:var(--ink);font-size:1.3rem;line-height:1;cursor:pointer;opacity:.6;transition:opacity .3s;padding:0}
  .ss-ctrl .ss-arrow:hover{opacity:1}
  .ss-ctrl .ss-dots{display:flex;gap:8px}
  .ss-ctrl .ss-dots button{width:8px;height:8px;border-radius:50%;border:none;background:#cfcfcf;cursor:pointer;padding:0;transition:background .3s}
  .ss-ctrl .ss-dots button.on{background:var(--ink)}

  .body-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:70px;margin-top:64px;align-items:start}
  .desc .jp{font-size:clamp(1.1rem,1.8vw,1.35rem);line-height:1.95;letter-spacing:.01em}
  .desc .en{margin-top:24px;font-size:.92rem;line-height:1.8;color:var(--ink-soft)}
  .credits{border-top:1px solid var(--line);padding-top:8px}
  .credits .c{display:flex;flex-direction:column;gap:2px;border-bottom:1px solid var(--line);padding:14px 0}
  .credits .c b{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:500}
  .credits .c span{font-size:.98rem}
  .btn{display:inline-flex;align-items:center;gap:12px;margin-top:30px;background:var(--ink);color:var(--bg);border:1px solid var(--ink);border-radius:var(--radius);padding:15px 22px;font-size:.85rem;letter-spacing:.02em;transition:opacity .35s var(--ease),gap .35s}
  .btn:hover{opacity:.82;gap:18px}

  .video{margin-top:70px;border-radius:14px;overflow:hidden;aspect-ratio:16/9;background:#000;position:relative;display:block}
  .video iframe{width:100%;height:100%;border:0;display:block}
  .video img{width:100%;height:100%;object-fit:cover}
  .video .playbtn{position:absolute;inset:0;margin:auto;width:78px;height:78px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;padding-left:4px;transition:background .3s var(--ease),transform .3s var(--ease)}
  .video.facade:hover .playbtn{background:rgba(0,0,0,.82);transform:scale(1.06)}

  .pager{display:flex;justify-content:space-between;gap:20px;margin-top:90px;border-top:1px solid var(--line);padding-top:34px}
  .pager a{display:flex;flex-direction:column;gap:6px;max-width:46%}
  .pager .lab{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .pager .nm{font-weight:500;font-size:1.05rem;transition:opacity .3s}
  .pager a:hover .nm{opacity:.55}
  .pager .next{text-align:right;margin-left:auto;align-items:flex-end}

  footer{background:transparent;border-top:1px solid var(--line);padding:64px var(--pad);display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .copy{font-size:.76rem;color:var(--ink-soft)}

  @media(max-width:820px){
    :root{--pad:22px}
    body.nav-open header{mix-blend-mode:normal}
    .menu{position:fixed;inset:0;background:#0d0d0d;color:#fff;flex-direction:column;justify-content:center;align-items:flex-start;gap:14px;padding:40px;font-size:2rem;transform:translateY(-100%);transition:transform .6s var(--ease)}
    .menu.open{transform:none}
    .menu a{opacity:1}
    .menu .has-sub{display:flex;flex-direction:column;gap:10px}
    .menu .sub{position:static;opacity:1;visibility:visible;transform:none;padding:6px 0 0 18px;gap:8px}
    .menu .sub a{font-size:1.05rem;opacity:.8}
    .burger{display:flex;z-index:210}
    .burger span{background:#fff}
    .menu.open ~ .burger span:nth-child(1){transform:translateY(8px) rotate(45deg)}
    .menu.open ~ .burger span:nth-child(2){opacity:0}
    .menu.open ~ .burger span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}
    main{padding:100px var(--pad) 70px}
    .body-grid{grid-template-columns:1fr;gap:44px}
  }

  /* === Unified type scale (Montserrat / BIZ UDGothic) === */
  h1{font-size:clamp(2.2rem,5vw,3.4rem);font-weight:500;letter-spacing:.01em;line-height:1.3}
  .desc .jp,.desc .en,.submeta,.credits .c span{font-size:1rem;font-weight:400;color:var(--ink);line-height:1.8}
  .pager .nm{font-size:1.25rem;font-weight:500;color:var(--ink)}
</style>
</head>
<body>
<div class="cursor" id="cursor"><span class="lbl">View</span></div>

<header>
  <a href="index.html#top" class="logo">YUYA KATO INTRODUCTION</a>
  <nav class="menu" id="menu">
    <a href="index.html#top">TOP</a>
    <a href="index.html#vision">VISION</a>
    <div class="has-sub">
      <a href="index.html#about">ABOUT</a>
      <div class="sub">
        <a href="index.html#capability">Capability</a>
        <a href="index.html#history">History</a>
        <a href="index.html#guidelines">Action Guidelines</a>
      </div>
    </div>
    <a href="index.html#works">WORKS</a>
  </nav>
  <button class="burger" id="burger" aria-label="menu"><span></span><span></span><span></span></button>
</header>

<main id="main"><!-- filled by JS --></main>

<footer>
  <span class="copy">© 2026 Yuya Kato. All rights reserved.</span>
</footer>

<script src="works-data.js"></script>
<script>
function ytId(u){const m=(u||"").match(/(?:youtu\.be\/|[?&]v=|embed\/)([\w-]{11})/);return m?m[1]:null;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

const params=new URLSearchParams(location.search);
const id=params.get("id");
let i=WORKS.findIndex(w=>w.id===id);
if(i<0)i=0;
const w=WORKS[i];
const prev=WORKS[(i-1+WORKS.length)%WORKS.length];
const next=WORKS[(i+1)%WORKS.length];
document.title=w.t+" — YUYA KATO";

const yt=ytId(w.link);
const catLabel={experience:"Experience",web:"Web & App",brand:"Brand & Film"}[w.cat]||"";

const credits=[
  ["Client",w.client],
  ["Year",w.year],
  ["Category",catLabel],
  ["Agency",w.agency],
  ["Production",w.production],
  ["Role",w.role]
].filter(c=>c[1]).map(c=>`<div class="c"><b>${esc(c[0])}</b><span>${esc(c[1])}</span></div>`).join("");

const media="";
const gal=(w.gallery&&w.gallery.length>1)?w.gallery:null;
const heroMedia=gal
  ? `<div class="hero-img ss">${gal.map((g,i)=>`<img class="ss-img${i===0?' on':''}" loading="lazy" src="${esc(g)}" alt="${esc(w.t)}">`).join('')}</div><div class="ss-ctrl"><button class="ss-arrow prev" aria-label="prev">‹</button><div class="ss-dots">${gal.map((g,i)=>`<button class="${i===0?'on':''}" data-i="${i}"></button>`).join('')}</div><button class="ss-arrow next" aria-label="next">›</button></div>`
  : `<div class="hero-img"><img src="${esc(w.img)}" alt="${esc(w.t)}"></div>`;
let btn="";
if(w.link){
  btn=`<a class="btn" data-cursor href="${esc(w.link)}" target="_blank" rel="noopener">${yt?"Watch on YouTube":"Visit Site"} <span>↗</span></a>`;
}

document.getElementById("main").innerHTML=`
  <a class="back" href="index.html#works"><span>←</span> Back to Works</a>
  <p class="eyebrow">${esc(catLabel)}</p>
  <h1>${esc(w.t)}</h1>
  <p class="submeta">${esc(w.client)} &nbsp;·&nbsp; ${esc(w.year)}</p>
  ${heroMedia}
  <div class="body-grid">
    <div class="desc">
      <p class="jp">${esc(w.descJP)}</p>
      <p class="en">${esc(w.descEN)}</p>
      ${btn}
    </div>
    <div class="credits">${credits}</div>
  </div>
  ${media}
  <div class="pager">
    <a class="prev" data-cursor href="project.html?id=${prev.id}"><span class="lab">← Prev</span><span class="nm">${esc(prev.t)}</span></a>
    <a class="next" data-cursor href="project.html?id=${next.id}"><span class="lab">Next →</span><span class="nm">${esc(next.t)}</span></a>
  </div>`;

// Scroll-reveal for detail sections (staggered)
(function(){
  const main=document.getElementById('main');
  const kids=[...main.children];
  kids.forEach((el,i)=>{el.classList.add('reveal');el.style.transitionDelay=(i*0.07).toFixed(2)+'s';});
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}}),{threshold:.08});
  kids.forEach(el=>io.observe(el));
})();

// Hero gallery slideshow
(function(){
  const imgs=[...document.querySelectorAll('.hero-img.ss .ss-img')]; if(!imgs.length)return;
  const ctrl=document.querySelector('.ss-ctrl'); if(!ctrl)return;
  const dots=[...ctrl.querySelectorAll('.ss-dots button')];
  let n=0,t;
  function go(k){imgs[n].classList.remove('on');if(dots[n])dots[n].classList.remove('on');n=(k+imgs.length)%imgs.length;imgs[n].classList.add('on');if(dots[n])dots[n].classList.add('on');}
  function play(){t=setInterval(()=>go(n+1),4000);}function stop(){clearInterval(t);}
  ctrl.querySelector('.next').addEventListener('click',()=>{stop();go(n+1);play();});
  ctrl.querySelector('.prev').addEventListener('click',()=>{stop();go(n-1);play();});
  dots.forEach(d=>d.addEventListener('click',()=>{stop();go(+d.dataset.i);play();}));
  play();
})();

// Custom cursor
const cur=document.getElementById('cursor');
let cx=innerWidth/2,cy=innerHeight/2,tx=cx,ty=cy;
addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
(function loop(){cx+=(tx-cx)*.18;cy+=(ty-cy)*.18;cur.style.left=cx+'px';cur.style.top=cy+'px';requestAnimationFrame(loop)})();
document.addEventListener('mouseover',e=>{if(e.target.closest('[data-cursor]'))cur.classList.add('big')});
document.addEventListener('mouseout',e=>{if(e.target.closest('[data-cursor]'))cur.classList.remove('big')});
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')location.href='project.html?id='+prev.id;if(e.key==='ArrowRight')location.href='project.html?id='+next.id});

// Mobile menu toggle
const burger=document.getElementById('burger'),menu=document.getElementById('menu');
burger.addEventListener('click',()=>{menu.classList.toggle('open');document.body.classList.toggle('nav-open');});
menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{menu.classList.remove('open');document.body.classList.remove('nav-open');}));
</script>
</body>
</html>
